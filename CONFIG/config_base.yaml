# MOE-RRG Base Configuration
# All hyperparameters with paper-specified defaults

seed: 42

# ─── Data ───
data:
  dataset: "mimic_cxr"           # mimic_cxr | mimic_abn
  root_dir: "/data/mimic-cxr"    # Root directory for MIMIC-CXR JPEG files
  metadata_csv: "/data/mimic-cxr/mimic-cxr-2.0.0-metadata.csv.gz"
  report_csv: "/data/mimic-cxr/mimic_cxr_sectioned.csv"
  split_csv: "/data/mimic-cxr/mimic-cxr-2.0.0-split.csv.gz"
  processed_metadata_csv: "/data/mimic-cxr/processed/processed_metadata.csv"
  max_image_size: 518             # RAD-DINO / DINOv2 input resolution
  max_text_len: 256               # Max tokens for report text
  max_indication_len: 64          # Max tokens for indication text
  max_prior_len: 128              # Max tokens for prior report text
  max_impression_len: 128         # Max tokens for impression text
  num_workers: 4
  pin_memory: true

# Stage discretization (visit count -> stage ID)
stage_bins:
  - [1, 0]         # Stage 0: first visit (visit_num == 1)
  - [2, 1]         # Stage 1: second visit (visit_num == 2)
  - [3, 2]         # Stage 2: visits 3-5
  - [6, 3]         # Stage 3: visits 6-10
  - [11, 4]        # Stage 4: visits >10
stage2_range: [3, 5]
stage3_range: [6, 10]
stage4_min: 11

# Imaging views to include
views:
  - "AP"
  - "PA"
  - "LA"
  - "LL"

# ─── Model ───
model:
  # Visual encoder (RAD-DINO approximation)
  visual_encoder:
    name: "microsoft/rad-dino"    # Public RAD-DINO checkpoint
    pretrained: true
    frozen: true                  # Paper: RAD-DINO frozen
    patch_size: 14
    hidden_size: 768              # RAD-DINO hidden dim
    output_tokens: 49             # After pooling (7x7 grid)

  # Text encoder (CXR-BERT)
  text_encoder:
    name: "microsoft/BiomedVLP-CXR-BERT-specialized"   # Public CXR-BERT checkpoint
    hidden_size: 768
    frozen: false                 # Paper: CXR-BERT fine-tuned
    max_length: 256

  # Auxiliary text prompts
  auxiliary:
    ind_prompt: "[IND]"           # Learnable type prompt for indication
    pri_prompt: "[PRI]"           # Learnable type prompt for prior report
    gate_hidden_dim: 256          # Hidden dim for sigmoid-gated bias MLP

  # SV-MoE
  sv_moe:
    enabled: true
    num_experts: 4                # K = 4
    num_stages: 5                 # Stage IDs: 0-4
    num_views: 4                  # View IDs: AP, PA, LA, LL
    embed_dim: 64                 # Embedding dim for stage/view IDs
    router_hidden_dim: 128        # MLP hidden dim for routing
    expert_hidden_dim: 2048       # FFN hidden dim per expert
    use_top_k: 1                  # Single-expert routing (argmax)
    dropout: 0.1

  # HP-QFormer
  hp_qformer:
    enabled: true
    num_queries: 32               # P = 32 learnable queries
    num_layers: 4                 # 4 Q-Former layers
    hidden_size: 768              # Q-Former hidden dim
    num_heads: 8                  # Attention heads
    cross_attention_freq: 1       # Cross-attention every layer
    prefix_injection_depth: "all" # "all" | 1 | 2 | 3
    dropout: 0.1

  # CMN Memory (Copy Memory Network) for prior-report copying
  cmn:
    method: "prior_attention"     # "prior_attention" | "learned_cache" | "disabled"
    num_heads: 8                  # Attention heads for copy mechanism
    dropout: 0.1
    use_copy_gate: true           # Gating between copy and generate
    use_static_cache: false       # Keep legacy learned cache off in prior_attention mode

  # Token Position Weighting (Phase 3.1)
  token_weighting:
    enabled: true                 # Learn to weight important token positions
    max_seq_len: 256              # Max sequence length
    initialization: "uniform"     # "uniform" or "by_position"

  # Curriculum Learning (Phase 3.2)
  curriculum_learning:
    enabled: true                 # Progressive focus scheduling during training
    max_epochs: 50                # Total training epochs
    temperature_base: 2.0         # Starting temperature (broad focus)
    temperature_min: 0.3          # Final temperature (sharp focus)
    schedule: "linear"            # "linear", "cosine", or "exponential" annealing
    center: 0.5                   # Center position for Gaussian (0.5 = middle)
    width: 0.25                   # Gaussian width as fraction of seq_len

  # Decoder (standard Transformer)
  decoder:
    num_layers: 3                 # 3-layer Transformer
    hidden_size: 512              # Decoder hidden dim
    num_heads: 8                  # Attention heads
    ffn_dim: 2048                 # FFN hidden dim
    dropout: 0.1
    max_length: 256               # Max generation length
    vocab_size: 30522             # BERT vocab size
    pad_token_id: 0
    bos_token_id: 101             # [CLS]
    eos_token_id: 102             # [SEP]
    inject_prefix_into_self: true  # Paper injects PrefixKV into self-attention too

  # Token pooling
  token_pooling:
    output_grid: 7                # 7x7 = 49 tokens
    method: "adaptive"            # adaptive | average

# ─── Training ───
training:
  epochs: 50
  batch_size: 16
  grad_accum_steps: 2             # Effective batch = 32
  max_grad_norm: 1.0

  # Differential learning rates (paper-specified)
  optimizer:
    name: "adam"
    lr_text_encoder: 2.0e-5       # CXR-BERT
    lr_transformer: 2.0e-4        # Transformer backbone
    lr_imp_branch: 5.0e-5         # Impression contrastive branch
    lr_default: 1.0e-4            # Default for other params
    weight_decay: 0.01
    adam_beta1: 0.9
    adam_beta2: 0.999

  scheduler:
    name: "cosine"
    warmup_ratio: 0.1

  # Loss weights
  lambda_moe: 0.2
  lambda_imp: 0.1
  tau: 0.07                       # Contrastive temperature

  # Mixed precision
  fp16: true

  # Early stopping
  early_stopping:
    patience: 10
    metric: "val_loss"
    mode: "min"

# ─── Evaluation ───
evaluation:
  nlg_metrics:
    - "bleu_1"
    - "bleu_2"
    - "bleu_3"
    - "bleu_4"
    - "meteor"
    - "rouge_l"
  clinical_metrics:
    - "chexpert_f1"
    - "chexpert_precision"
    - "chexpert_recall"
  beam_size: 5
  length_penalty: 0.6
  max_gen_length: 256

# ─── Logging ───
logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  log_interval: 50                # Steps between log entries
  val_interval: 1                 # Validate every N epochs
  save_top_k: 3                   # Keep best K checkpoints
  use_wandb: false
  wandb_project: "moe-rrg"
  wandb_entity: null
  use_tensorboard: true
